spring.application.name=sara-api

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sara}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

spring.datasource.hikari.data-source-properties.prepareThreshold=0

# OCI Object Storage Configuration
oci.tenant-id=${OCI_TENANT_ID}
oci.user-id=${OCI_USER_ID}
oci.fingerprint=${OCI_FINGERPRINT}
oci.region=${OCI_REGION}
# Caminho para o arquivo .pem que você baixou
oci.private-key-file-path=classpath:keys/oci_api_key.pem
oci.namespace.name=${OCI_NAMESPACE_NAME}
oci.bucket.name=${OCI_BUCKET_NAME}

# Multipart Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB