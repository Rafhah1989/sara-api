spring.application.name=sara-api

# Mercado Pago Configurations
MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN:TEST-YOUR-TOKEN-HERE}
URL_WEBHOOK=${URL_WEBHOOK:http://localhost:8080/api/mercadopago/webhook}
MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET:sua_chave_secreta_aqui}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sara}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.tcpKeepAlive=true
spring.datasource.hikari.max-lifetime=58000
spring.datasource.hikari.keepalive-time=20000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=SaraPool
# OCI Object Storage Configuration
oci.tenant-id=${OCI_TENANT_ID}
oci.user-id=${OCI_USER_ID}
oci.fingerprint=${OCI_FINGERPRINT}
oci.region=${OCI_REGION}
# Caminho para o arquivo .pem que você baixou
oci.private-key-file-path=classpath:keys/oci_api_key.pem
oci.namespace.name=${OCI_NAMESPACE_NAME}
oci.bucket.name=${OCI_BUCKET_NAME}
oci.bucket.name.products=${OCI_BUCKET_NAME_PRODUCTS:sara_produtos}


# Multipart Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB